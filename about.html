<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>About — Keywords Checker</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<link rel="icon" type="image/x-icon" href="favicon_io/favicon.ico">
<link rel="icon" type="image/png" sizes="32x32" href="favicon_io/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="favicon_io/favicon-16x16.png">
<link rel="apple-touch-icon" sizes="180x180" href="favicon_io/apple-touch-icon.png">
<link rel="manifest" href="favicon_io/site.webmanifest">
<style>
*{box-sizing:border-box;margin:0;padding:0;}
:root{
  --bg:#0d0d14;--surface:#13131f;--surface2:#1a1a2e;--surface3:#20203a;
  --border:#2a2a45;--border2:#353560;
  --text:#e2e0ff;--text2:#8888b8;--text3:#4a4a70;
  --accent:#6c63ff;--accent-hover:#8a83ff;
}
body{font-family:'Syne',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;}

.navbar{display:flex;align-items:center;padding:0 40px;height:58px;background:var(--surface);border-bottom:1px solid var(--border);gap:8px;position:sticky;top:0;z-index:100;}
.nav-logo{display:flex;align-items:center;gap:10px;text-decoration:none;flex-shrink:0;}
.nav-logo img{height:36px;display:block;}
.nav-logo-text{display:flex;flex-direction:column;line-height:1.15;}
.nav-logo-text span{font-weight:800;font-size:13px;letter-spacing:.2px;color:var(--text);}
.nav-sep{flex:1;}
.nav-links{display:flex;align-items:center;gap:2px;}
.nav-link{padding:5px 14px;border-radius:7px;font-size:13px;font-weight:600;color:var(--text2);text-decoration:none;transition:color .15s,background .15s;white-space:nowrap;}
.nav-link:hover{color:var(--text);background:var(--surface2);}
.nav-link.active{color:var(--text);background:var(--surface3);border:1px solid var(--border2);}
.nav-cta{padding:6px 18px;border-radius:7px;font-size:13px;font-weight:700;color:#fff;text-decoration:none;background:var(--accent);transition:background .15s;white-space:nowrap;margin-left:8px;}
.nav-cta:hover{background:var(--accent-hover);}

.page{max-width:780px;margin:0 auto;width:100%;padding:64px 24px 80px;flex:1;}
.page-label{font-size:11px;font-weight:700;letter-spacing:2px;text-transform:uppercase;color:var(--text3);margin-bottom:12px;}
.page-title{font-size:clamp(28px,4vw,46px);font-weight:800;letter-spacing:-.5px;line-height:1.1;margin-bottom:48px;}

.placeholder{background:var(--surface);border:1px dashed var(--border2);border-radius:14px;padding:64px 40px;text-align:center;color:var(--text3);}
.placeholder p{font-size:15px;line-height:1.7;}

footer{background:var(--surface);border-top:1px solid var(--border);padding:20px 40px;text-align:center;font-size:12px;color:var(--text3);}
</style>
</head>
<body>

<nav class="navbar">
  <a href="index.html" class="nav-logo">
    <img src="Keywords-checker.svg" alt="Keywords Checker">
    <div class="nav-logo-text"><span>Keywords</span><span>Checker</span></div>
  </a>
  <div class="nav-links">
    <a href="how-it-works.html" class="nav-link">How it works</a>
    <a href="checker.html" class="nav-link">Checker</a>
    <a href="about.html" class="nav-link active">About</a>
  </div>
  <div class="nav-sep"></div>
  <a href="checker.html" class="nav-cta">Open Checker →</a>
</nav>

<main class="page">
  <div class="page-label">About</div>
  <h1 class="page-title">About me</h1>
  <div class="placeholder">
    <p>Coming soon.</p>
  </div>
</main>

<footer>© 2025 Keywords Checker. Built for Amazon sellers.</footer>

</body>
</html>
